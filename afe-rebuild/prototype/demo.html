<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFE Portal v2 — Interactive Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  navy: { DEFAULT:'#0b3a52', dark:'#082b3d', light:'#155172' },
  brandaccent:'#2f9e8f'
} } } };
</script>
<style>
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;}
  .step{display:none} .step.active{display:block}
</style>
</head>
<body class="bg-slate-100 text-slate-800">

<div id="modeBanner" class="bg-amber-100 text-amber-800 text-center text-xs py-1.5">
  Demo mode — loading…
</div>

<header class="bg-navy text-white shadow">
  <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-white/15 grid place-items-center font-bold">NL</div>
      <span class="font-semibold tracking-wide">IT Equipment Portal</span>
      <span class="text-xs bg-brandaccent/90 px-2 py-0.5 rounded">demo</span>
    </div>
    <nav id="topnav" class="hidden md:flex items-center gap-1 text-sm">
      <button onclick="go('dashboard')" class="px-3 py-1.5 rounded hover:bg-white/10">Dashboard</button>
      <button onclick="newRequest()" class="px-3 py-1.5 rounded hover:bg-white/10">New Request</button>
      <span class="mx-2 h-5 w-px bg-white/20"></span>
      <div class="flex items-center gap-2">
        <span class="text-xs text-white/70">Viewing as</span>
        <select id="roleSel" onchange="setRole(this.value)" class="bg-navy-light text-white text-xs rounded px-2 py-1 border border-white/20">
          <option value="reviewer">Reviewer (Megan)</option>
          <option value="bu">BU Leader (Denny)</option>
          <option value="it">IT / Helpdesk</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button onclick="setAuthed(false);go('login')" class="px-3 py-1.5 rounded hover:bg-white/10 text-white/70">Sign out</button>
    </nav>
  </div>
</header>

<main id="app" class="max-w-6xl mx-auto px-4 py-6"></main>

<footer class="text-center text-xs text-slate-400 py-6">AFE Portal v2 — interactive demo. Open this file in any browser; no install required.</footer>

<script>
/* ============================================================================
   In-browser mock "backend": state + the real workflow rules.
   Stages: bu_review → (replacement) approved
                     → (new_equipment) reviewer_review → approved
           approved → ordered → shipped → received ;  any gate → denied
   ============================================================================ */
const STAGES = {
  bu_review:{label:'BU review',cls:'bg-amber-100 text-amber-700'},
  reviewer_review:{label:'Needs review',cls:'bg-brandaccent/15 text-brandaccent'},
  approved:{label:'Approved',cls:'bg-emerald-100 text-emerald-700'},
  ordered:{label:'Ordered',cls:'bg-sky-100 text-sky-700'},
  shipped:{label:'Shipped',cls:'bg-sky-100 text-sky-700'},
  received:{label:'Received',cls:'bg-slate-200 text-slate-600'},
  denied:{label:'Denied',cls:'bg-red-100 text-red-700'},
};
const ROLE_NAME = {reviewer:'Megan McDaniel',bu:'Denny Garner',it:'Help Desk',admin:'System Admin'};

let state, role='reviewer', view='login', currentId=null, wizard={step:1,data:{}}, liveMode=false, liveError=null;

const fetchOpts = { credentials: 'same-origin', headers: { Accept: 'application/json' } };
const DEMO_USER = 'Admin';
const DEMO_PASS = 'AfePortal123!@#';
const AUTH_KEY = 'afe_authed';

function isAuthed(){ return sessionStorage.getItem(AUTH_KEY)==='1'; }
function setAuthed(on){ if(on) sessionStorage.setItem(AUTH_KEY,'1'); else sessionStorage.removeItem(AUTH_KEY); }

function tryLogin(){
  const user=(document.getElementById('loginUser')?.value||'').trim();
  const pass=document.getElementById('loginPass')?.value||'';
  const err=document.getElementById('loginError');
  if(user===DEMO_USER && pass===DEMO_PASS){
    err?.classList.add('hidden');
    setAuthed(true);
    go('dashboard');
    return true;
  }
  if(err){ err.textContent='Invalid username or password. Use Admin / AfePortal123!@#'; err.classList.remove('hidden'); }
  return false;
}

function seed(){
  return { seq: 4822, role:'reviewer', requests: [
    mk(4821,'Dana','Ruiz','new_equipment','Laptop','Houston','Port Agency','4410','New hire replacing a role; prior laptop returned to pool.','Denny Garner','reviewer_review',
       [['Submitted','Dana Ruiz'],['BU Leader approved','Denny Garner'],['Awaiting reviewer','Megan & Stefan notified']]),
    mk(4820,'Marc','Ellison','replacement','Phone & Laptop','Mobile (Corp)','Corporate','2200','Existing laptop failing; repurposing a returned unit.','Denny Garner','approved',
       [['Submitted','Marc Ellison'],['BU Leader approved','Denny Garner'],['Approved — sent to Helpdesk','Denny Garner']]),
    mk(4819,'Priya','Nair','new_equipment','Desktop PC','Savannah','Liner Agency','3120','Second monitor + desktop for new analyst.','Andreas Ebensperger','bu_review',
       [['Submitted','Priya Nair']]),
    mk(4818,'Tom','Becker','replacement','MiFi','Seattle','Cargo Services','5050','Field MiFi lost; replacing from stock.','Denny Garner','shipped',
       [['Submitted','Tom Becker'],['BU Leader approved','Denny Garner'],['Approved — sent to Helpdesk','Denny Garner'],['Ordered','Help Desk'],['Shipped','Help Desk']]),
  ]};
}
function mk(id,fn,ln,type,equip,office,bu,cc,reason,submitTo,stage,events){
  return {id,number:id,first:fn,last:ln,type,equipment:equip,office,businessUnit:bu,costCenter:cc,
          reason,submitTo,stage,audit:events.map(e=>({action:e[0],actor:e[1],at:'Jun 2026'}))};
}
function loadRole(){ try{ role=localStorage.getItem('afe_role')||role; }catch(e){} }
function saveRole(){ localStorage.setItem('afe_role', role); }
function save(){ if(liveMode){ saveRole(); return; } state.role=role; saveRole(); localStorage.setItem('afe_demo', JSON.stringify(state)); }
function resetDemo(){ liveMode=false; liveError=null; localStorage.removeItem('afe_demo'); state=seed(); role='reviewer'; save(); updateModeBanner(); document.getElementById('roleSel').value=role; go('dashboard'); }
function updateModeBanner(message){
  const el=document.getElementById('modeBanner');
  if(liveMode){
    el.className='bg-emerald-100 text-emerald-900 text-center text-xs py-1.5';
    const total=state.total!=null?` · ${state.total} total in database`:'';
    el.innerHTML=`Live data from SiteGround (showing ${state.requests.length}${total}, read-only). <button onclick="resetDemo()" class="underline font-medium ml-2">Switch to offline demo</button>`;
  }else if(liveError){
    el.className='bg-red-100 text-red-900 text-center text-xs py-1.5';
    el.innerHTML=`Could not load live data: ${liveError} <button onclick="retryLive()" class="underline font-medium ml-2">Retry</button> <button onclick="resetDemo()" class="underline font-medium ml-2">Use offline demo</button>`;
  }else if(message){
    el.className='bg-sky-100 text-sky-900 text-center text-xs py-1.5';
    el.textContent=message;
  }else{
    el.className='bg-amber-100 text-amber-800 text-center text-xs py-1.5';
    el.innerHTML='Offline demo — data is faked in your browser. <button onclick="retryLive()" class="underline font-medium ml-2">Load live data</button> <button onclick="resetDemo()" class="underline font-medium ml-2">Reset demo data</button>';
  }
}
async function loadLive(){
  updateModeBanner('Loading requests from SiteGround…');
  try{
    const res=await fetch('/api/requests?limit=200', fetchOpts);
    const data=await res.json().catch(()=>({}));
    if(!res.ok || !data.live || !Array.isArray(data.requests)){
      throw new Error(data.error || `Failed to load requests (HTTP ${res.status})`);
    }
    liveMode=true;
    liveError=null;
    localStorage.removeItem('afe_demo');
    const maxId=data.requests.reduce((m,r)=>Math.max(m,Number(r.id)||0),0);
    state={seq:maxId+1, role, requests:data.requests, total:data.total};
    saveRole();
    updateModeBanner();
    return true;
  }catch(e){
    console.warn('Live DB unavailable', e);
    liveMode=false;
    liveError=e.message||String(e);
    state={seq:0, role, requests:[]};
    updateModeBanner();
    return false;
  }
}
function retryLive(){ loadLive().then(ok=>{ if(ok) render(); }); }

/* ---- workflow transitions (pure-ish; also unit-tested in Node) ---- */
function buApprove(r){ log(r,'BU Leader approved',ROLE_NAME.bu);
  if(r.type==='new_equipment'){ r.stage='reviewer_review'; log(r,'Awaiting reviewer','Megan & Stefan notified'); }
  else { r.stage='approved'; log(r,'Approved — sent to Helpdesk',ROLE_NAME.bu); } }
function reviewerApprove(r){ r.stage='approved'; log(r,'Final approval — sent to Helpdesk',ROLE_NAME.reviewer); }
function deny(r,who){ r.stage='denied'; log(r,'Denied',who); }
function fulfil(r){ const nx={approved:'ordered',ordered:'shipped',shipped:'received'}[r.stage];
  if(nx){ r.stage=nx; log(r, nx.charAt(0).toUpperCase()+nx.slice(1), ROLE_NAME.it); } }
function log(r,action,actor){ r.audit.push({action,actor,at:'just now'}); }

/* ---- what can the current role do to a request right now? ---- */
function actionsFor(r){
  if(liveMode) return [];
  const a=[];
  if((role==='bu'||role==='admin') && r.stage==='bu_review'){ a.push(['Approve',()=>{buApprove(r);save();open(r.id);},'ok'],['Deny',()=>{deny(r,ROLE_NAME.bu);save();open(r.id);},'no']); }
  if((role==='reviewer'||role==='admin') && r.stage==='reviewer_review'){ a.push(['Approve → notify Helpdesk',()=>{reviewerApprove(r);save();open(r.id);},'ok'],['Deny',()=>{deny(r,ROLE_NAME.reviewer);save();open(r.id);},'no']); }
  if((role==='it'||role==='admin') && ['approved','ordered','shipped'].includes(r.stage)){ const nx={approved:'Mark Ordered',ordered:'Mark Shipped',shipped:'Mark Received'}[r.stage]; a.push([nx,()=>{fulfil(r);save();open(r.id);},'ok']); }
  return a;
}

/* ============================ VIEWS ============================ */
const app=()=>document.getElementById('app');
function go(v){ if(v!=='login' && !isAuthed()){ v='login'; } view=v; document.getElementById('topnav').style.visibility = v==='login'?'hidden':'visible'; render(); window.scrollTo(0,0); }
function setRole(r){ role=r; save(); if(view==='detail'&&currentId) open(currentId); else render(); }
function newRequest(){ if(liveMode){ alert('New requests are disabled in live read-only mode.'); return; } wizard={step:1,data:{type:'new_equipment'}}; go('wizard'); }
async function open(id){
  if(liveMode && !state.requests.find(x=>x.id===id)){
    try{
      const res=await fetch('/api/requests?id='+id, fetchOpts);
      const data=await res.json();
      if(res.ok && data.request) state.requests.unshift(data.request);
    }catch(e){ console.warn(e); }
  }
  currentId=id; go('detail');
}

function badge(stage){ const s=STAGES[stage]; return `<span class="text-xs ${s.cls} px-2 py-0.5 rounded font-medium">${s.label}</span>`; }
function typeBadge(t){ return t==='new_equipment' ? `<span class="text-xs bg-violet-100 text-violet-700 px-2 py-0.5 rounded">New equipment</span>` : `<span class="text-xs bg-sky-100 text-sky-700 px-2 py-0.5 rounded">Replacement</span>`; }

function render(){
  if(view==='login') return renderLogin();
  if(view==='dashboard') return renderDashboard();
  if(view==='wizard') return renderWizard();
  if(view==='detail') return renderDetail();
}

function renderLogin(){
  app().innerHTML = `
  <div class="min-h-[70vh] grid place-items-center">
    <div class="w-full max-w-sm bg-white rounded-xl shadow p-8">
      <div class="text-center mb-6">
        <div class="w-12 h-12 mx-auto rounded-lg bg-navy text-white grid place-items-center font-bold text-lg">NL</div>
        <h1 class="mt-3 text-xl font-semibold text-navy">IT Equipment Portal</h1>
        <p class="text-sm text-slate-500">Sign in to continue</p>
      </div>
      <label class="block text-sm font-medium mb-1">Username</label>
      <input id="loginUser" type="text" autocomplete="username" placeholder="Admin" class="w-full border rounded-lg px-3 py-2 mb-3 outline-none focus:ring-2 focus:ring-navy">
      <div class="flex items-center justify-between mb-1"><label class="text-sm font-medium">Password</label><a class="text-xs text-navy">Forgot?</a></div>
      <input id="loginPass" type="password" autocomplete="current-password" placeholder="AfePortal123!@#" class="w-full border rounded-lg px-3 py-2 mb-2 outline-none focus:ring-2 focus:ring-navy">
      <p id="loginError" class="text-red-600 text-xs mb-3 hidden"></p>
      <button onclick="tryLogin()" class="w-full bg-navy hover:bg-navy-dark text-white rounded-lg py-2.5 font-medium">Sign in</button>
      <div class="flex items-center gap-3 my-4 text-xs text-slate-400"><span class="flex-1 h-px bg-slate-200"></span>OR<span class="flex-1 h-px bg-slate-200"></span></div>
      <button onclick="document.getElementById('loginError').textContent='Microsoft SSO is not enabled in this demo. Use Admin / AfePortal123!@#'; document.getElementById('loginError').classList.remove('hidden');" class="w-full border border-slate-300 hover:bg-slate-50 rounded-lg py-2.5 text-sm font-medium flex items-center justify-center gap-2">
        <span class="inline-grid grid-cols-2 gap-0.5 w-3.5 h-3.5"><span class="bg-[#f25022]"></span><span class="bg-[#7fba00]"></span><span class="bg-[#00a4ef]"></span><span class="bg-[#ffb900]"></span></span>
        Sign in with Microsoft 365
      </button>
      <p class="text-xs text-center text-slate-400 mt-4">Demo login · Username <span class="font-medium text-slate-500">Admin</span> · Password <span class="font-medium text-slate-500">AfePortal123!@#</span></p>
    </div>
  </div>`;
}

function counts(){ const c={}; Object.keys(STAGES).forEach(k=>c[k]=0); state.requests.forEach(r=>c[r.stage]++); return c; }

function renderDashboard(){
  const c=counts();
  const hint={reviewer:'Reviewing the queue as Megan McDaniel',bu:'Approving requests submitted to you',it:'Fulfilling approved requests',admin:'Full access · users, roles, audit log'}[role];
  const rows = state.requests.map(r=>{
    const acts=actionsFor(r);
    const cta = acts.length? `<span class="text-navy text-xs font-medium">${acts[0][0].split(' ')[0]} →</span>` : `<span class="text-slate-400 text-xs">View</span>`;
    return `<tr class="hover:bg-slate-50 cursor-pointer" onclick="open(${r.id})">
      <td class="px-4 py-3 font-medium text-navy">#${r.number}</td>
      <td class="px-4 py-3">${r.first} ${r.last}</td>
      <td class="px-4 py-3">${typeBadge(r.type)}</td>
      <td class="px-4 py-3">${r.equipment}</td>
      <td class="px-4 py-3">${r.businessUnit||'—'}</td>
      <td class="px-4 py-3">${r.office}</td>
      <td class="px-4 py-3">${badge(r.stage)}</td>
      <td class="px-4 py-3 text-right">${cta}</td></tr>`; }).join('');
  const card=(n,l,extra='')=>`<div class="bg-white rounded-lg p-4 shadow-sm ${extra}"><div class="text-2xl font-bold text-slate-700">${n}</div><div class="text-xs text-slate-500">${l}</div></div>`;
  app().innerHTML = `
  <div class="flex items-center justify-between mb-5">
    <div><h1 class="text-2xl font-semibold text-navy">Requests</h1><p class="text-sm text-slate-500">${hint}</p></div>
    <button onclick="newRequest()" class="bg-navy hover:bg-navy-dark text-white rounded-lg px-4 py-2 text-sm font-medium">+ New request</button>
  </div>
  <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-6">
    ${card(c.bu_review,'BU review')}
    ${card(c.reviewer_review,'Needs review', role==='reviewer'?'ring-2 ring-brandaccent':'')}
    ${card(c.approved,'Approved')}
    ${card(c.ordered+c.shipped,'Ordered/Shipped')}
    ${card(c.received,'Received')}
    ${card(c.denied,'Denied')}
  </div>
  <div class="bg-white rounded-lg shadow-sm overflow-hidden">
    <table class="w-full text-sm"><thead class="bg-slate-50 text-slate-500 text-left"><tr>
      <th class="px-4 py-3 font-medium">AFE #</th><th class="px-4 py-3 font-medium">Employee</th><th class="px-4 py-3 font-medium">Type</th>
      <th class="px-4 py-3 font-medium">Equipment</th><th class="px-4 py-3 font-medium">Division</th><th class="px-4 py-3 font-medium">Office</th><th class="px-4 py-3 font-medium">Stage</th><th class="px-4 py-3 font-medium text-right">Action</th>
    </tr></thead><tbody class="divide-y">${rows||'<tr><td colspan="8" class="px-4 py-8 text-center text-slate-400">No requests loaded.</td></tr>'}</tbody></table>
  </div>`;
}

function renderDetail(){
  const r=state.requests.find(x=>x.id===currentId); if(!r){ return go('dashboard'); }
  const acts=actionsFor(r);
  const actionBtns = acts.length ? acts.map(a=>{
    const cls = a[2]==='ok' ? 'bg-emerald-600 hover:bg-emerald-700 text-white' : 'bg-white border border-red-300 text-red-600 hover:bg-red-50';
    return `<button data-i onclick="ACT(${r.id},${acts.indexOf(a)})" class="${cls} rounded-lg px-4 py-2 text-sm font-medium">${a[0]}</button>`; }).join('')
    : `<p class="text-sm text-slate-400">No action available for your role at this stage.</p>`;
  window.ACT=(id,i)=>{ const rr=state.requests.find(x=>x.id===id); actionsFor(rr)[i][1](); };
  const timeline = r.audit.map((e,i)=>{
    const last=i===r.audit.length-1;
    const dot = r.stage==='denied'&&last?'bg-red-500': last&&['reviewer_review','bu_review'].includes(r.stage)?'bg-brandaccent animate-pulse':'bg-emerald-500';
    return `<li class="pl-4"><span class="absolute -left-1.5 w-3 h-3 rounded-full ${dot}"></span><p class="font-medium">${e.action}</p><p class="text-slate-500 text-xs">${e.actor} · ${e.at}</p></li>`; }).join('');
  app().innerHTML = `
  <button onclick="go('dashboard')" class="text-sm text-navy mb-4">← Back to requests</button>
  <div class="grid md:grid-cols-3 gap-6">
    <div class="md:col-span-2 bg-white rounded-xl shadow-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <div><h1 class="text-xl font-semibold text-navy">AFE #${r.number} — ${r.first} ${r.last}</h1><p class="text-sm text-slate-500">${r.office}</p></div>
        ${badge(r.stage)}
      </div>
      <dl class="grid grid-cols-2 gap-y-3 text-sm">
        <div><dt class="text-slate-400">Request type</dt><dd class="font-medium">${r.type==='new_equipment'?'New equipment':'Replacement (repurposed)'}</dd></div>
        <div><dt class="text-slate-400">Equipment</dt><dd class="font-medium">${r.equipment||'—'}</dd></div>
        <div><dt class="text-slate-400">Employee email</dt><dd class="font-medium">${r.email||'—'}</dd></div>
        <div><dt class="text-slate-400">Job title</dt><dd class="font-medium">${r.jobTitle||'—'}</dd></div>
        <div><dt class="text-slate-400">Business unit</dt><dd class="font-medium">${r.businessUnit||'—'}</dd></div>
        <div><dt class="text-slate-400">Cost center</dt><dd class="font-medium">${r.costCenter||'—'}</dd></div>
        <div><dt class="text-slate-400">Submitted</dt><dd class="font-medium">${r.submittedAt||'—'}</dd></div>
        <div><dt class="text-slate-400">Submitted to</dt><dd class="font-medium">${r.submitTo||'—'}</dd></div>
        <div class="col-span-2"><dt class="text-slate-400">Reason / notes</dt><dd class="font-medium">${r.reason||'—'}</dd></div>
      </dl>
      <div class="mt-6 border-t pt-5">
        <p class="text-sm font-medium text-slate-700 mb-2">Actions — ${ROLE_NAME[role]}</p>
        <div class="flex gap-3 flex-wrap">${actionBtns}</div>
      </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-6">
      <h2 class="font-medium text-slate-700 mb-4">Audit timeline</h2>
      <ol class="relative border-l border-slate-200 ml-2 space-y-5 text-sm">${timeline}</ol>
    </div>
  </div>`;
}

function renderWizard(){
  const d=wizard.data, s=wizard.step;
  const dots=[1,2,3,4].map(n=>`<div class="w-7 h-7 rounded-full grid place-items-center text-xs font-semibold ${n<=s?'bg-navy text-white':'bg-slate-200 text-slate-500'}">${n}</div>`);
  const bar=`<div class="flex items-center mb-8"><div class="flex-1 flex items-center">
     ${dots[0]}<div class="flex-1 h-0.5 bg-slate-200 mx-2"></div>${dots[1]}<div class="flex-1 h-0.5 bg-slate-200 mx-2"></div>${dots[2]}<div class="flex-1 h-0.5 bg-slate-200 mx-2"></div>${dots[3]}
  </div></div>`;
  let body='';
  if(s===1) body=`
    <h2 class="font-medium text-slate-700 mb-4">What's needed?</h2>
    <label class="block text-sm font-medium mb-1">Equipment type</label>
    <select id="w_equip" class="w-full border rounded-lg px-3 py-2 mb-4">${['Laptop','Desktop PC','Phone','Phone & Laptop','MiFi','Other'].map(o=>`<option ${d.equipment===o?'selected':''}>${o}</option>`).join('')}</select>
    <label class="block text-sm font-medium mb-2">Request type</label>
    <div class="grid grid-cols-2 gap-3">
      <label class="border rounded-lg p-3 cursor-pointer hover:border-navy ${d.type==='replacement'?'border-navy ring-1 ring-navy':''}"><input type="radio" name="rt" value="replacement" class="mr-2" ${d.type==='replacement'?'checked':''}>Replacement<span class="block text-xs text-slate-500">Repurposed / replacing existing</span></label>
      <label class="border rounded-lg p-3 cursor-pointer hover:border-navy ${d.type==='new_equipment'?'border-navy ring-1 ring-navy':''}"><input type="radio" name="rt" value="new_equipment" class="mr-2" ${d.type==='new_equipment'?'checked':''}>New equipment<span class="block text-xs text-slate-500">Net-new purchase</span></label>
    </div>`;
  if(s===2) body=`
    <h2 class="font-medium text-slate-700 mb-4">Who is it for?</h2>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="block text-sm font-medium mb-1">First name</label><input id="w_first" class="w-full border rounded-lg px-3 py-2" value="${d.first||''}"></div>
      <div><label class="block text-sm font-medium mb-1">Last name</label><input id="w_last" class="w-full border rounded-lg px-3 py-2" value="${d.last||''}"></div>
      <div><label class="block text-sm font-medium mb-1">Office</label><input id="w_office" class="w-full border rounded-lg px-3 py-2" value="${d.office||'Houston'}"></div>
      <div><label class="block text-sm font-medium mb-1">Business unit</label><input id="w_bu" class="w-full border rounded-lg px-3 py-2" value="${d.businessUnit||'Port Agency'}"></div>
    </div>`;
  if(s===3) body=`
    <h2 class="font-medium text-slate-700 mb-4">Details</h2>
    <label class="block text-sm font-medium mb-1">Cost center</label><input id="w_cc" class="w-full border rounded-lg px-3 py-2 mb-4" value="${d.costCenter||''}">
    <label class="block text-sm font-medium mb-1">Reason / justification</label><textarea id="w_reason" class="w-full border rounded-lg px-3 py-2" rows="3" placeholder="Explain why this equipment is needed…">${d.reason||''}</textarea>`;
  if(s===4) body=`
    <h2 class="font-medium text-slate-700 mb-4">Send for approval</h2>
    <label class="block text-sm font-medium mb-1">Business Unit Leader</label>
    <select id="w_submit" class="w-full border rounded-lg px-3 py-2 mb-4">${['Denny Garner','Andreas Ebensperger','Stefan Wolf','Megan McDaniel'].map(o=>`<option ${d.submitTo===o?'selected':''}>${o}</option>`).join('')}</select>
    <div class="bg-slate-50 border rounded-lg p-4 text-sm text-slate-600"><p class="font-medium text-slate-700 mb-1">What happens next</p>
    ${d.type==='replacement'?'Repurposed → BU Leader approves and it goes straight to the Helpdesk (Megan notified).':'Net-new → after BU approval, Megan &amp; Stefan review before the Helpdesk is told.'}</div>`;
  app().innerHTML = `
    <div class="max-w-2xl mx-auto">
      <h1 class="text-2xl font-semibold text-navy mb-1">New ${d.type==='replacement'?'replacement':'equipment'} request</h1>
      <p class="text-sm text-slate-500 mb-6">Step ${s} of 4</p>
      ${bar}
      <div class="bg-white rounded-xl shadow-sm p-6">
        <div>${body}</div>
        <div class="flex justify-between mt-6">
          <button onclick="wizNav(-1)" class="px-4 py-2 rounded-lg border text-slate-600 hover:bg-slate-50" style="visibility:${s===1?'hidden':'visible'}">Back</button>
          <button onclick="wizNav(1)" class="px-5 py-2 rounded-lg bg-navy hover:bg-navy-dark text-white font-medium">${s===4?'Submit request':'Next'}</button>
        </div>
      </div>
    </div>`;
}
function captureWizard(){
  const s=wizard.step, d=wizard.data, g=id=>document.getElementById(id);
  if(s===1){ d.equipment=g('w_equip').value; const rt=document.querySelector('input[name=rt]:checked'); if(rt) d.type=rt.value; }
  if(s===2){ d.first=g('w_first').value; d.last=g('w_last').value; d.office=g('w_office').value; d.businessUnit=g('w_bu').value; }
  if(s===3){ d.costCenter=g('w_cc').value; d.reason=g('w_reason').value; }
  if(s===4){ d.submitTo=g('w_submit').value; }
}
function wizNav(dir){
  captureWizard();
  if(dir===1 && wizard.step===4){ return submitWizard(); }
  wizard.step=Math.min(4,Math.max(1,wizard.step+dir));
  render();
}
function submitWizard(){
  const d=wizard.data; const id=state.seq++;
  const r=mk(id,d.first||'New',d.last||'Employee',d.type,d.equipment||'Laptop',d.office||'Houston',d.businessUnit||'—',d.costCenter||'—',d.reason||'—',d.submitTo||'Denny Garner','bu_review',[['Submitted',(d.first||'New')+' '+(d.last||'Employee')]]);
  state.requests.unshift(r); save();
  alert('Request #'+id+' submitted → now in BU review. Switch to the BU Leader role to approve it, then Reviewer for net-new.');
  open(id);
}

/* boot */
loadRole();
document.getElementById('roleSel').value=role;
loadLive().finally(()=>go(isAuthed()?'dashboard':'login'));
</script>
</body>
</html>
